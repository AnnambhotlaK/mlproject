<html>
<body>
    <div class="login">
       <h1>WTA Match Winner Predictor</h1>
   
       <form action="{{ url_for('predict_datapoint')}}" method="post">

        <!--TOURNEY_ID-->
        <div class="mb-3">
            <label class="form-label">Tournament ID</label>
            <input class="form-control" type="number" name="tourney_id"
                min='0' max='100' />
        </div>

        <!--SURFACE-->
        <div class="mb-3">
            <label class="form-label">Surface</label>
            <select class="form-control" name="surface" placeholder="Select Surface" required>
                <option class="placeholder" selected disabled value="">Select Surface</option>
                <option value="hard">
                    Hard
                </option>
                <option value="clay">
                    Clay
                </option>
                <option value="grass">
                    Grass
                </option>
            </select>
        </div>

        <!--DRAW_SIZE-->
        <div class="mb-3">
            <label class="form-label">Draw Size</label>
            <select class="form-control" name="draw_size" placeholder="Select Draw Size" required>
                <option class="placeholder" selected disabled value="">Select Draw Size</option>
                <option value="8">
                    8
                </option>
                <option value="32">
                    32
                </option>
                <option value="64">
                    64
                </option>
                <option value="128">
                    128
                </option>
            </select>
        </div>


        <!--PREDICTION BUTTON-->
        <div class="mb-3">
            <input class="btn btn-primary" type="submit" value="Predict Winner" required />
        </div>

    </form>

    <!--PREDICTION OUTPUT-->
    <h2>
       Your predicted winner is: {{prediction}}
    </h2>
    
   <body>
</html>

<html>
<body>
    <div class="login">
       <h1>WTA Match Winner Predictor</h1>
   
       <form action="{{ url_for('predict_datapoint')}}" method="post">

        <!--P1_SEED-->
        <div class="mb-3">
            <label class="form-label">Player 1 Seed</label>
            <input class="form-control" type="number" name="tourney_id"
                min='1' max='32' />
        </div>

        <!--P2_SEED-->
        <div class="mb-3">
            <label class="form-label">Player 2 Seed</label>
            <input class="form-control" type="number" name="tourney_id"
                min='1' max='32' />
        </div>


        <!--ACES-->        
        <div class="mb-3-group">
            <!--P1_ACE-->
            <div class="mb-3">
                <label class="form-label">Player 1 Aces</label>
                <input class="form-control" type="number" name="p1_ace"
                    min='0' max='35' />
            </div>

            <!--P2_ACE-->
            <div class="mb-3">
                <label class="form-label">Player 2 Aces</label>
                <input class="form-control" type="number" name="p1_ace"
                    min='0' max='35' />
            </div>
        </div>


        <!--DOUBLE FAULTS-->        
        <div class="mb-3-group">
            <!--P1_DF-->
            <div class="mb-3">
                <label class="form-label">Player 1 Double Faults</label>
                <input class="form-control" type="number" name="p1_df"
                    min='0' max='35' />
            </div>

            <!--P2_DF-->
            <div class="mb-3">
                <label class="form-label">Player 2 Double Faults</label>
                <input class="form-control" type="number" name="p2_df"
                    min='0' max='35' />
            </div>
        </div>


        <!--SERVE PERCENTAGE-->
        <div class="mb-3-group">
            <!--P1_SVPT-->
            <div class="mb-3">
                <label class="form-label">Player 1 Serve Percentage</label>
                <input class="form-control" type="number" name="p1_svpt"
                    min='0' max='100' />
            </div>

            <!--P2_SVPT-->
            <div class="mb-3">
                <label class="form-label">Player 2 Serve Percentage</label>
                <input class="form-control" type="number" name="p2_svpt"
                    min='0' max='100' />
                </div>
        </div>


        <!--FIRST SERVE IN %-->
        <div class="mb-3-group">
            <!--P1_1STIN-->
            <div class="mb-3">
                <label class="form-label">Player 1 First Serve In %</label>
                <input class="form-control" type="number" name="p1_1stIn"
                    min='0' max='100' />
            </div>

            <!--P2_1STIN-->
            <div class="mb-3">
                <label class="form-label">Player 2 First Serve In %</label>
                <input class="form-control" type="number" name="p2_1stIn"
                    min='0' max='100' />
            </div>
        </div>


        <!--FIRST SERVE WON %-->
        <div class="mb-3-group">
            <!--P1_1STWON-->
            <div class="mb-3">
                <label class="form-label">Player 1 First Serve Won %</label>
                <input class="form-control" type="number" name="p1_1stWon"
                    min='0' max='100' />
            </div>

            <!--P2_1STWON-->
            <div class="mb-3">
                <label class="form-label">Player 2 First Serve In %</label>
                <input class="form-control" type="number" name="p2_1stWon"
                    min='0' max='100' />
            </div>
        </div>


        <!--SECOND SERVE WON %-->
        <div class="mb-3-group">
            <!--P1_2NDWON-->
            <div class="mb-3">
                <label class="form-label">Player 1 Second Serve Won %</label>
                <input class="form-control" type="number" name="p1_2ndWon"
                    min='0' max='100' />
            </div>

            <!--P2_2NDWON-->
            <div class="mb-3">
                <label class="form-label">Player 2 Second Serve In %</label>
                <input class="form-control" type="number" name="p2_2ndWon"
                    min='0' max='100' />
            </div>
        </div>


        <!--BREAK POINTS FACED-->
        <div class="mb-3-group">
            <!--P1_BPFACED-->
            <div class="mb-3">
                <label class="form-label">Player 1 Break Points Faced</label>
                <input class="form-control" type="number" name="p1_bpFaced"
                    min='0' max='30' />
            </div>

            <!--P2_2NDWON-->
            <div class="mb-3">
                <label class="form-label">Player 2 Break Points Faced</label>
                <input class="form-control" type="number" name="p2_bpFaced"
                    min='0' max='30' />
            </div>
        </div>


        <!--RANKING POINTS-->
        <div class="mb-3-group">
            <!--P1_RANK_POINTS-->
            <div class="mb-3">
                <label class="form-label">Player 1 Ranking Points</label>
                <input class="form-control" type="number" name="p1_rank_points"
                    min='0' max='15000' />
            </div>
            <!--P2_RANK_POINTS-->
            <div class="mb-3">
                <label class="form-label">Player 2 Ranking Points</label>
                <input class="form-control" type="number" name="p2_rank_points"
                    min='0' max='15000' />
            </div>
        </div>


        <!--PREDICTION BUTTON-->
        <div class="mb-3">
            <input class="btn btn-primary" type="submit" value="Predict Winner" required />
        </div>

    </form>

    <!--PREDICTION OUTPUT-->
    <h2>
       Your predicted winner is: {{prediction}}
    </h2>
    
   <body>
</html>
